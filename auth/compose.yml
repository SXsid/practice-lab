services:
  server:
    build:
      context: .
      dockerfile: dockerfile
    container_name: api
    ports:
      - 8080:8080
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      pg:
        condition: service_healthy

  pg:
    image: postgres:latest
    container_name: authPG
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=sid
      - POSTGRES_PASSWORD=sid
      - POSTGRES_DB=auth
    volumes:
      - ./database:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sid -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
