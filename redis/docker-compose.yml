services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_PASS=
      - POSTGRES_DSN=postgres://postgres:postgres@postgres:5432/leaderboard?sslmode=disable
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - leaderboard-net
    restart: unless-stopped

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - leaderboard-net
    restart: unless-stopped

  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=leaderboard
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leaderboard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - leaderboard-net
    restart: unless-stopped

networks:
  leaderboard-net:
    driver: bridge
